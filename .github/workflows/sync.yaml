name: Daily Sync to ModelScope

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Prerequisite
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git git-lfs

      - name: Pull & Sync
        env:
          MS_TOKEN: ${{ secrets.MS_TOKEN }}
          MS_NAMESPACE: "Growl1234"
          MS_REPONAME: "cp2k_toolchain_mirror"
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git lfs install
          git config --global lfs.locksverify false

          export GIT_LFS_SKIP_SMUDGE=1
          git clone --depth 1 https://oauth2:${MS_TOKEN}@www.modelscope.cn/datasets/${MS_NAMESPACE}/${MS_REPONAME}.git ms_workspace

          cd ms_workspace

          wget -nv -N -r -np -nH --cut-dirs=2 \
               --reject-regex="\?|index.html\?" \
               --reject="index.html*" \
               "https://www.cp2k.org/static/downloads/" || true

          find . -name "index.html*" -delete
          rm -f robots.txt .listing* 2>/dev/null || true

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Auto sync from cp2k.org: $(date +'%Y-%m-%d %H:%M:%S UTC')"
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git push origin ${CURRENT_BRANCH}
            echo "Changes pushed to branch: ${CURRENT_BRANCH}"
          else
            echo "No updates detected, skipping commit & push."
          fi
